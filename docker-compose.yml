services:
  api:
    build:
      context: ./backend
    working_dir: /app
    command: npm run dev
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    depends_on:
      - mongo
      - redis
      - postgis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: fitstrike_geo
      POSTGRES_USER: fitstrike
      POSTGRES_PASSWORD: fitstrike
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  mongo_data:
  redis_data:
  postgis_data:
